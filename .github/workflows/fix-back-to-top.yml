# trigger: 2
name: Fix Back To Top Button

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-back-to-top.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          old_css = ".totop{position:fixed;right:18px;bottom:18px;z-index:60;width:48px;height:48px;border-radius:50%;background:var(--berry);color:#fff;display:grid;place-items:center;font-size:1.5rem;font-weight:900;text-decoration:none;box-shadow:0 6px 18px rgba(214,51,108,.4);opacity:0;visibility:hidden;transform:translateY(10px);transition:opacity .25s,transform .25s,background .15s}"
          new_css = ".totop{position:fixed;right:18px;bottom:18px;z-index:60;width:48px;height:48px;border:0;border-radius:50%;background:var(--berry);color:#fff;display:grid;place-items:center;font-family:inherit;font-size:1.5rem;font-weight:900;text-decoration:none;box-shadow:0 6px 18px rgba(214,51,108,.4);opacity:0;visibility:hidden;transform:translateY(10px);transition:opacity .25s,transform .25s,background .15s;cursor:pointer}"
          s = s.replace(old_css, new_css)
          old_html = """<a href=\"#top\" class=\"totop\" id=\"totop\" aria-label=\"回到頁面最上方\">↑</a>
<script>
(function(){var b=document.getElementById('totop');function s(){if(window.scrollY>320){b.classList.add('show');}else{b.classList.remove('show');}}window.addEventListener('scroll',s,{passive:true});s();})();
</script>"""
          new_html = """<button type=\"button\" class=\"totop\" id=\"totop\" aria-label=\"回到頁面最上方\">↑</button>
<script>
(function(){
  var b=document.getElementById('totop');
  if(!b)return;
  function toggleTopButton(){
    if(window.scrollY>320){b.classList.add('show');}
    else{b.classList.remove('show');}
  }
  b.addEventListener('click',function(){
    window.scrollTo({top:0,left:0,behavior:'smooth'});
  });
  window.addEventListener('scroll',toggleTopButton,{passive:true});
  toggleTopButton();
})();
</script>"""
          s = s.replace(old_html, new_html)
          Path('.github/workflows/fix-back-to-top.yml').unlink(missing_ok=True)
          p.write_text(s, encoding='utf-8')
          assert '<button type="button" class="totop"' in s
          assert 'window.scrollTo({top:0,left:0,behavior:' in s
          assert '</body>' in s and '</html>' in s
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-back-to-top.yml
          git commit -m "Fix back to top button" || exit 0
          git push
